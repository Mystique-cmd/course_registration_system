<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Course Registration - Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app" data-page="dashboard">
    <section class="dashboard" aria-label="Student Dashboard">
      <aside class="sidebar" aria-label="Sidebar navigation">
        <div class="brand-title sidebar-brand">Atomicity</div>

        <nav class="nav" aria-label="Primary">
          <button class="nav-item is-active" type="button" data-nav="dashboard">Dashboard</button>
          <button class="nav-item" type="button" data-nav="browse">Browse Courses</button>
          <button class="nav-item" type="button" data-nav="schedule">Schedule</button>
          <button class="nav-item" type="button" data-nav="grades">Grades</button>
          <button class="nav-item" type="button" data-nav="settings">Settings</button>
        </nav>

        <div class="sidebar-actions">
          <button class="btn btn-danger" type="button" id="drop-course-btn">Drop Course</button>
          <button class="btn btn-ghost" type="button" id="logout-btn">Logout</button>
        </div>
      </aside>

      <div class="dashboard-main">
        <header class="dash-header">
          <div>
            <div class="dash-greeting" id="dash-greeting">Hello, Student</div>
            <div class="dash-sub" id="dash-program">Program</div>
          </div>
        </header>

        <div class="grid">
          <section class="card" aria-label="Degree progress">
            <h2 class="card-title">Degree Progress</h2>
            <div class="progress">
              <div class="progress-meta"><span id="progress-earned">0</span> / <span id="progress-required">0</span> credits earned</div>
              <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuenow="0" aria-valuemax="0">
                <div class="progress-fill" id="progress-fill"></div>
              </div>
            </div>
          </section>

          <section class="card" aria-label="Waitlist positions">
            <h2 class="card-title">Waitlist</h2>
            <div class="list" id="waitlist-list"></div>
            <div class="muted small" id="waitlist-empty">No waitlist entries.</div>
          </section>

          <section class="card" aria-label="Registered courses">
            <h2 class="card-title">Registered Courses</h2>
            <div class="table" role="table" aria-label="Registered courses table">
              <div class="thead" role="row">
                <div role="columnheader">Course</div>
                <div role="columnheader">Instructor</div>
                <div role="columnheader">Schedule</div>
                <div role="columnheader">Location</div>
              </div>
              <div class="tbody" id="courses-dashboard-list" role="rowgroup"></div>
            </div>
          </section>

          <section class="card" aria-label="Calendar">
            <h2 class="card-title">Calendar</h2>
            <div class="calendar" id="calendar"></div>
            <div class="muted small">Highlighted dates are upcoming tests.</div>
          </section>

          <section class="card" aria-label="Notifications">
            <h2 class="card-title">Notifications</h2>
            <div class="list" id="notifications-list"></div>
            <div class="muted small" id="notifications-empty">No new notifications.</div>
          </section>

          <section class="card" aria-label="Dashboard content">
            <h2 class="card-title" id="dash-secondary-title">Dashboard</h2>
            <div class="muted" id="dash-secondary-body">Select an item from the sidebar.</div>
          </section>
        </div>

        <div class="actions">
          <button class="btn btn-ghost" type="button" id="catalog-page-btn">Open Catalog</button>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
